// =================================================================
// БАЗОВЫЕ НАСТРОЙКИ СЕРВЕРА
// =================================================================
hostname "f298/R"  // Имя сервера в поиске Steam
sv_password "f298"               // Пароль для входа (оставьте пустые "", если сервер открытый)
sv_lan 0                                  // 0 = сервер доступен в интернете, 1 = только локальная сеть

// =================================================================
// БЕЗОПАСНОСТЬ И УДАРЕННОЕ УПРАВЛЕНИЕ (RCON)
// =================================================================
// ВАЖНО: Эту строчку мы НЕ пишем вручную, Docker подставит пароль из файла .env автоматически!
// rcon_password "${RCON_PASSWORD}" 

// =================================================================
// НАСТРОЙКИ ИГРОВОГО ПРОЦЕССА (ГЕЙМПЛЕЙ)
// =================================================================
mp_flashlight 1                           // Разрешить использовать фонарик
mp_friendlyfire 1                         // Отключить урон по своим (0 - выкл, 1 - вкл)
mp_footsteps 1                            // Включить звуки шагов
sv_cheats 0                               // Отключить встроенные читы (иначе не будет интереса играть)
sv_timeout 60                             // Через сколько секунд кикать зависших игроков

// =================================================================
// СПЕЦИФИЧЕСКИЕ НАСТРОЙКИ OBSIDIAN CONFLICT
// =================================================================
oc_sv_keep_weapons 0                      // Сохранять оружие игроков после их смерти (1 - да, 0 - отнимать)
oc_sv_lives -1                            // Количество жизней на команду (-1 = бесконечно, полезно для фана)
oc_sv_player_collision 1                  // Игроки проходят сквозь друг друга (0 - выкл застревания, 1 - сталкиваются)
oc_sv_flashlight_recharge_rate 100        // Скорость зарядки фонарика (100 - стандарт)
oc_sv_healthcharger_rechargetime 30       // Время перезарядки настенных лечилок в секундах
oc_sv_selfdamagepenalty 0                 // Убирает штраф очков, если взорвал сам себя
sv_allowdownload 1
sv_allowupload 1
sv_downloadurl "http://${SERVER_IP}/obsidian/"


// =================================================================
// НАСТРОЙКИ СЕТИ И ДВИЖКА (РЕЙТЫ ДЛЯ ОТСУТСТВИЯ ЛАГОВ)
// =================================================================
sv_maxrate 0                              // Максимальная пропускная способность (0 - без ограничений)
sv_minrate 30000                          // Минимальный порог сети
sv_maxupdaterate 66                       // Количество пакетов обновлений в секунду
sv_minupdaterate 33
fps_max 300                               // Ограничение FPS самого сервера (выше 300 для Source ставить нет смысла)

// =================================================================
// ЛОГИРОВАНИЕ
// =================================================================
log on                                    // Включить запись логов сервера (нужно для некоторых плагинов)
sv_logbans 1                              // Записывать баны в лог
