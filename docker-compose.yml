
services:
  # Сервис 1: Игровой сервер Obsidian Conflict (Windows-версия на Linux через Wine)
  game-server:
    image: cm2network/steamcmd:root
    container_name: oc_game_server
    privileged: true
    volumes:
      # Постоянное хранилище на жестком диске Linux-сервера
      - ./server_data:/home/steam/hl2dm-server
      # Пробрасываем конфиг в правильную линуксовую директорию мода
      - ./server/server.cfg:/home/steam/hl2dm-server/obsidian/cfg/server.cfg
    ports:
      - "27015:27015/udp" # Игровой трафик
      - "27015:27015/tcp" # RCON трафик
    environment:
      - RCON_PASSWORD=${RCON_PASSWORD}
    entrypoint: >
      bash -c "
      echo '=== ОБНОВЛЕНИЕ ДВИЖКА ЧЕРЕЗ STEAMCMD ===' &&
      /home/steam/steamcmd/steamcmd.sh +force_install_dir /home/steam/hl2dm-server +login anonymous +app_update 232370 validate +quit &&
      echo '=== ЗАПУСК СЕРВЕРА OBSIDIAN CONFLICT ===' &&
      cd /home/steam/hl2dm-server &&
      chmod +x srcds_run srcds_linux &&
      exec ./srcds_run -game obsidian -console -port 27015 +map oc_harvest +maxplayers 8 +rcon_password ${RCON_PASSWORD} -noscripting
      "
    restart: unless-stopped

  # Сервис 2: Наш Discord-бот
  discord-bot:
    build: ./bot
    container_name: oc_discord_bot
    depends_on:
      - game-server
    environment:
      - SERVER_IP=game-server 
      - RCON_PORT=27015
      - RCON_PASSWORD=${RCON_PASSWORD}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - SERVER_REAL_IP=${SERVER_IP}
      - NOTIFY_CHANNEL_ID=${DISCORD_CHANNEL_ID}
    restart: unless-stopped

  # Сервис 3: Быстрая загрузка файлов для игроков (FastDL)
  fastdl-web:
    image: nginx:alpine
    container_name: oc_fastdl
    volumes:
      # Делимся файлами карт и моделей из игрового сервера с веб-сервером
      - ./server_data/obsidian:/usr/share/nginx/html/obsidian:ro
    ports:
      - "80:80" # Открываем стандартный веб-порт
    restart: unless-stopped

  # Сервис 4: Сервер интернет-радио для синхронизации музыки
  icecast-stream:
    image: infiniteproject/icecast:latest
    container_name: oc_icecast
    ports:
      - "8000:8000" # Порт радиопотока
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme_source
      - ICECAST_ADMIN_PASSWORD=hackme_admin
      - ICECAST_PASSWORD=hackme_relay
    restart: unless-stopped
